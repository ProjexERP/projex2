<div class=" container-contact100 ">
    <div class="wrap-contact100">
        <div class="contact100-form validate-form">
            <div class="contact100-form-title">Connect With Us

                                src="js/line.json"

                                autoplay>
            </lottie-player> -->

            </div>
            <form  class="validate-form" style="width: 100%;" (ngSubmit)="onSubmit()">
  <label class="label-input100" for="name">Tell us your name *</label>
  <div class="wrap-input100 rs1-wrap-input100 validate-input">
    <input
      id="textName"
      class="form-control"
      type="text"
      formControlName="name"
      placeholder="Name/ Organization Name"
    />
    <span class="focus-input100">{{ getError('name') }}</span>
  </div>

  <label class="label-input100" for="email">Enter your email *</label>
  <div class="wrap-input100 validate-input form-group">
    <input
      id="txtEmail"
      class="form-control"
      type="text"
      formControlName="email"
      placeholder="Eg. example@email.com"
    />
    <span class="focus-input100">{{ getError('email') }}</span>
  </div>

  <label class="label-input100" for="phone">Enter phone number</label>
  <div class="wrap-input100">
    <input
      id="phone"
      class="form-control"
      type="text"
      formControlName="phone"
      placeholder="Eg. +1 800 000000"
    />
    <span class="focus-input100"></span>
  </div>

  <label class="label-input100" for="message">Message *</label>
  <div class="wrap-input100 validate-input form-group">
    <textarea
      id="message"
      class="form-control"
      formControlName="message"
      placeholder="Write us a message"
      style="resize: vertical"
    ></textarea>
    <span class="focus-input100">{{ getError('message') }}</span>
  </div>

  <div class="container-contact100-form-btn">
    <button class="contact100-form-btn" type="submit" [disabled]="validateForm.invalid">
      Send Message
    </button>
  </div>
</form>

        </div>
        <div class="contact100-more flex-col-c-m" style="background-image: url('images/contact-us.webp'); ">
            <div class="flex-w size1 p-b-47">
                <div class="txt1 p-r-25">
                    <span class="lnr lnr-map-marker"></span>
                </div>
                <div class="flex-col size2">
                    <span class="txt1 p-b-20" style="display: block">Address
                    </span>
                    <span class="txt2" style="display: block">B-297, Mellcon Engineers Pvt. Ltd., Okhla Industrial Area
                        Phase-1, New Delhi-110020, INDIA
                    </span>
                </div>
            </div>
            <div class="dis-flex size1 p-b-47">
                <div class="txt1 p-r-25">
                    <span class="lnr lnr-phone-handset"></span>
                </div>
                <div class="flex-col size2">
                    <span class="txt1 p-b-20" style="display: block">Lets Talk
                    </span>

                    <span class="txt3" style="display: block"><a href="tel:+919582098984">+91 9582098984</a>
                    </span>
                </div>
            </div>
            <div class="dis-flex size1 p-b-47">
                <div class="txt1 p-r-25">
                    <span class="lnr lnr-envelope"></span>
                </div>
                <div class="flex-col size2">
                    <span class="txt1 p-b-20 " style="display: block">General Support
                    </span>
                    <span class="txt3"> <a href="mailto:sales12@tendernews.com">sales12&#64;tendernews.com</a>
                    </span>
                </div>
            </div>
        </div>
    </div>
</div>
