<div class="container-fluid">
  <div class="container">
    <div class="col-lg-12">
      <div class="login-image">
        <h3 style="font-weight:800; color:black">
          Achieve more, effortlessly — only with ProjexERP.
        </h3>
        <img src="images/login-erp.webp" alt="login-erp" width="400" />
      </div>

      <div class="loginForm-container">
        <div class="col-lg-offset-4 col-lg-4 loginForm">
          <h3 style="text-align:center; font-weight:800">Login</h3>

          <form [formGroup]="loginForm" (ngSubmit)="onSubmit()">
            <div class="form-group">
              <input list="emailSuggestions" id="email" type="email" formControlName="email" class="form-control"
                placeholder="Email" required />
              <div *ngIf="loginForm.get('email')?.touched && loginForm.get('email')?.invalid" style="color:red">
                <div *ngIf="loginForm.get('email')?.errors?.['required']">Email is required</div>
                <div *ngIf="loginForm.get('email')?.errors?.['email']">Enter a valid email</div>
              </div>
            </div>

            <div class="form-group">
              <input type="password" formControlName="password" class="form-control" placeholder="Password" required />

            </div>

            <div class="form-group">
              <select formControlName="service" class="form-control" required>
                <option value="">--Select Service--</option>
                <option value="p">Payroll</option>
                <option value="Financial Accounting">Financial Accounting</option>
                <option value="HRM">HRM</option>
                <option value="ERP">ERP</option>
              </select>
              <div *ngIf="loginForm.get('service')?.touched && loginForm.get('service')?.invalid" style="color: red;">Please Select a Service</div>
            </div>


            <div class="form-group">
              <div id="dvCaptcha"></div>
              <input type="hidden" formControlName="captcha" />
              <div *ngIf="captchaError" style="color:red">{{ captchaError }}</div>
            </div>

            <button type="submit" class="btn btn-primary pull-right">Click Here To Login</button>
          </form>

          <div class="clear"></div>
          <div class="divider" role="separator"></div>
          <div class="margin10px"></div>

          <p>
            Forgot Password? <a routerLink="/forgot">Click Here</a><br />
            <a routerLink="/signup">Click Here</a> For Signup
          </p>
        </div>
      </div>
    </div>
  </div>
</div>
